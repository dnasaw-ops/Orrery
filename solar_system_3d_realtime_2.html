<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orrery</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:monospace; }
#wrap { width:100vw; height:100vh; position:relative; }
canvas { width:100%; height:100%; display:block; }
#info { position:absolute;top:12px;left:12px;color:#ccc;font-size:10px;line-height:1.85;pointer-events:none;max-height:90vh;overflow:hidden; }
#clock { position:absolute;top:12px;right:12px;color:#888;font-size:11px;text-align:right;pointer-events:none; }
#speed { position:absolute;bottom:36px;right:12px;color:#888;font-size:11px;text-align:right;pointer-events:none; }
#hint { position:absolute;bottom:12px;left:12px;color:#444;font-size:10px;pointer-events:none; }
#btns { position:absolute;bottom:12px;right:12px;display:flex;gap:6px;align-items:center; }
#btns button { background:rgba(255,255,255,0.07);border:0.5px solid #444;color:#aaa;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px; }
#btns button:hover { background:rgba(255,255,255,0.16); }
#playbtn { font-size:15px !important; padding:2px 12px !important; }
#tooltip { position:absolute;display:none;background:rgba(0,0,0,0.88);color:#fff;padding:7px 11px;border-radius:6px;font-size:12px;pointer-events:none;border:0.5px solid #555;line-height:1.6; }
#legend { position:absolute;bottom:50px;left:12px;color:#555;font-size:10px;line-height:1.8;pointer-events:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="info"></div>
  <div id="clock"></div>
  <div id="speed"></div>
  <div id="hint">drag · scroll to zoom · click any object</div>
  <div id="legend">
    <span style="color:#aaaaaa">●</span> planet &nbsp;
    <span style="color:#88aaff">●</span> moon &nbsp;
    <span style="color:#ffcc44">●</span> dwarf/comet &nbsp;
    <span style="color:#886644">░</span> asteroid belt
  </div>
  <div id="btns">
    <button id="slower">slower</button>
    <button id="playbtn">▶</button>
    <button id="faster">faster</button>
  </div>
  <div id="tooltip"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, W/H, 0.001, 5000);

// ── time ──────────────────────────────────────────────────────────────────────
const J2000 = Date.UTC(2000,0,1,12,0,0);
function todayNoon(){ const n=new Date(); return Date.UTC(n.getUTCFullYear(),n.getUTCMonth(),n.getUTCDate(),12,0,0); }
let simMs = todayNoon(), lastWall = Date.now(), playing = false, speedMult = 86400*30;

function anchorSim(){ if(playing){ const n=Date.now(); simMs+=(n-lastWall)*speedMult; lastWall=n; } }
function setSpeed(s){ anchorSim(); speedMult=Math.max(1,s); updateSpeedLabel(); }
function getSimDate(){ return playing ? new Date(simMs+(Date.now()-lastWall)*speedMult) : new Date(simMs); }
function daysJ2k(d){ return (d.getTime()-J2000)/86400000; }

const playBtn=document.getElementById('playbtn'), speedEl=document.getElementById('speed');
function updateSpeedLabel(){
  if(!playing){speedEl.textContent='paused';return;}
  const s=speedMult;
  speedEl.textContent = s<3600 ? s.toFixed(0)+'× speed'
    : s<86400 ? (s/3600).toFixed(1)+' hrs/sec'
    : s<86400*365 ? (s/86400).toFixed(1)+' days/sec'
    : (s/86400/365.25).toFixed(1)+' yrs/sec';
}
updateSpeedLabel();
playBtn.addEventListener('click',()=>{
  if(!playing){lastWall=Date.now();playing=true;playBtn.textContent='⏸';}
  else{anchorSim();playing=false;playBtn.textContent='▶';}
  updateSpeedLabel();
});
document.getElementById('slower').addEventListener('click',()=>setSpeed(speedMult/10));
document.getElementById('faster').addEventListener('click',()=>setSpeed(speedMult*10));

// ── orbital mechanics ─────────────────────────────────────────────────────────
function solveKepler(M_deg,e){
  let M=M_deg*Math.PI/180, E=M;
  for(let i=0;i<100;i++){ const dE=(M-E+e*Math.sin(E))/(1-e*Math.cos(E)); E+=dE; if(Math.abs(dE)<1e-9)break; }
  return E;
}

// Returns heliocentric ecliptic XYZ in AU
function keplerXYZ(a,e,i_deg,node_deg,peri_deg,M0_deg,P_days,days){
  const n=360/P_days;
  const M=((M0_deg+n*days)%360+360)%360;
  const E=solveKepler(M,e);
  const nu=2*Math.atan2(Math.sqrt(1+e)*Math.sin(E/2),Math.sqrt(1-e)*Math.cos(E/2));
  const r=a*(1-e*Math.cos(E));
  const i2=i_deg*Math.PI/180, Om=node_deg*Math.PI/180, w=peri_deg*Math.PI/180;
  return {
    x: r*(Math.cos(Om)*Math.cos(nu+w)-Math.sin(Om)*Math.sin(nu+w)*Math.cos(i2)),
    y: r*(Math.sin(Om)*Math.cos(nu+w)+Math.cos(Om)*Math.sin(nu+w)*Math.cos(i2)),
    z: r*Math.sin(nu+w)*Math.sin(i2),
    r
  };
}

// Scene-space scaling: logarithmic beyond 1.6 AU
function auToScene(au){ return au<=1.6 ? au*10 : 16+Math.log(au/1.6)*22; }
function toScene(x,y,z){
  const au=Math.sqrt(x*x+y*y+z*z)||1e-9;
  const s=auToScene(au)/au;
  return new THREE.Vector3(x*s, z*s, y*s); // swap Y/Z for Three.js Y-up
}

// ── data ──────────────────────────────────────────────────────────────────────
// Planets: {name,a,e,i,node,peri,M0,P,color,r}
const PLANETS = [
  {name:'Mercury', a:0.387,  e:0.2056, i:7.005, node:48.33,  peri:29.12,  M0:174.8, P:87.97,   color:0xaaaaaa, r:0.35},
  {name:'Venus',   a:0.723,  e:0.0068, i:3.395, node:76.68,  peri:54.88,  M0:50.4,  P:224.70,  color:0xf5c842, r:0.55},
  {name:'Earth',   a:1.000,  e:0.0167, i:0.000, node:0,      peri:102.94, M0:357.5, P:365.25,  color:0x2277ff, r:0.60},
  {name:'Mars',    a:1.524,  e:0.0934, i:1.850, node:49.56,  peri:286.50, M0:19.4,  P:686.97,  color:0xdd4422, r:0.45},
  {name:'Jupiter', a:5.203,  e:0.0484, i:1.303, node:100.46, peri:273.87, M0:20.0,  P:4332.59, color:0xd4996c, r:1.40},
  {name:'Saturn',  a:9.537,  e:0.0542, i:2.485, node:113.72, peri:339.39, M0:317.0, P:10759.2, color:0xc8a96e, r:1.20},
  {name:'Uranus',  a:19.19,  e:0.0472, i:0.773, node:74.00,  peri:96.54,  M0:142.0, P:30685.4, color:0x88ddee, r:0.90},
  {name:'Neptune', a:30.07,  e:0.0086, i:1.770, node:131.78, peri:273.19, M0:259.9, P:60189.0, color:0x4466ff, r:0.85},
];

// Dwarf planets & small bodies (heliocentric Keplerian)
const DWARFS = [
  {name:'Ceres',  a:2.767, e:0.0758, i:10.59, node:80.33, peri:73.60, M0:95.99, P:1681.6, color:0x998877, r:0.28},
  {name:'Pluto',  a:39.48, e:0.2488, i:17.14, node:110.30,peri:113.76,M0:14.86, P:90560.0,color:0xddbb88, r:0.30},
];

// Comets (heliocentric Keplerian)
const COMETS = [
  // Halley's: a=17.83, e=0.967, i=162.2, node=58.42, peri=111.33, M0 at J2000 ~181.3, P=27507d (~75.3yr)
  {name:"Halley's Comet", a:17.83, e:0.9671, i:162.26, node:58.42, peri:111.33, M0:181.3, P:27507.0, color:0x88ffcc, r:0.22},
  // 67P/Churyumov–Gerasimenko: a=3.463, e=0.6409, i=7.04, node=50.15, peri=12.78, P=2354d
  {name:'Comet 67P',      a:3.463, e:0.6409, i:7.040, node:50.15,  peri:12.78, M0:62.4,  P:2354.0,  color:0x88ffcc, r:0.20},
];

// Moons — stored as {name, parentIdx (into PLANETS), a_km (semi-major axis km), P_days, color, r_scene, M0}
// We convert a_km to "parent-relative scene units" at render time
const MOON_SCALE = 0.004; // km -> scene units factor (tweaked for visibility)
const MOONS = [
  // Earth
  {name:'Moon',     parent:2, a:384400,   P:27.32,  e:0.0549, i:5.145, M0:135.0, color:0xaaaaaa, r:0.18},
  // Jupiter Galilean
  {name:'Io',       parent:4, a:421800,   P:1.769,  e:0.0041, i:0.04,  M0:0.0,   color:0xffee88, r:0.14},
  {name:'Europa',   parent:4, a:671100,   P:3.551,  e:0.0094, i:0.47,  M0:90.0,  color:0xaaccff, r:0.12},
  {name:'Ganymede', parent:4, a:1070400,  P:7.155,  e:0.0013, i:0.21,  M0:180.0, color:0xbbaa88, r:0.16},
  {name:'Callisto', parent:4, a:1882700,  P:16.689, e:0.0074, i:0.51,  M0:270.0, color:0x887766, r:0.15},
  // Saturn
  {name:'Titan',    parent:5, a:1221870,  P:15.945, e:0.0288, i:0.33,  M0:45.0,  color:0xddaa44, r:0.15},
];

// ── scene setup ───────────────────────────────────────────────────────────────
// Sun
scene.add(new THREE.Mesh(new THREE.SphereGeometry(2.2,32,32), new THREE.MeshBasicMaterial({color:0xffdd44})));
scene.add(new THREE.Mesh(new THREE.SphereGeometry(3.0,32,32), new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0.12})));
scene.add(new THREE.AmbientLight(0x222222));
const pLight = new THREE.PointLight(0xffffff,2.5,3000);
scene.add(pLight);

// Grid rings
const gm = new THREE.LineBasicMaterial({color:0x111811,transparent:true,opacity:0.6});
[1,2,3,5,8,12,20,31,45].forEach(au=>{
  const pts=[], s=auToScene(au);
  for(let a=0;a<=360;a+=3) pts.push(new THREE.Vector3(s*Math.cos(a*Math.PI/180),0,s*Math.sin(a*Math.PI/180)));
  scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),gm));
});

// ── asteroid belt ─────────────────────────────────────────────────────────────
(function(){
  const N=2800;
  const positions=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const au=2.2+Math.random()*1.0; // 2.2–3.2 AU
    const theta=Math.random()*Math.PI*2;
    const yoff=(Math.random()-0.5)*0.3; // slight vertical scatter
    const s=auToScene(au);
    positions[i*3]  =s*Math.cos(theta);
    positions[i*3+1]=yoff;
    positions[i*3+2]=s*Math.sin(theta);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0x886644,size:0.35,transparent:true,opacity:0.55})));
})();

// ── orbit path helper ─────────────────────────────────────────────────────────
function makeOrbitLine(a,e,i,node,peri,color,opacity){
  const pts=[];
  for(let deg=0;deg<=360;deg+=1){
    const th=deg*Math.PI/180;
    const r2=a*(1-e*e)/(1+e*Math.cos(th));
    const w=peri*Math.PI/180, Om=node*Math.PI/180, i2=i*Math.PI/180, nu=th;
    const X=r2*(Math.cos(Om)*Math.cos(nu+w)-Math.sin(Om)*Math.sin(nu+w)*Math.cos(i2));
    const Y=r2*(Math.sin(Om)*Math.cos(nu+w)+Math.cos(Om)*Math.sin(nu+w)*Math.cos(i2));
    const Z=r2*Math.sin(nu+w)*Math.sin(i2);
    pts.push(toScene(X,Y,Z));
  }
  const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({color,transparent:true,opacity}));
  scene.add(line);
  return line;
}

// Planet orbit lines
PLANETS.forEach(p=>makeOrbitLine(p.a,p.e,p.i,p.node,p.peri,0x223322,0.55));
// Dwarf orbit lines
DWARFS.forEach(d=>makeOrbitLine(d.a,d.e,d.i,d.node,d.peri,0x443322,0.4));
// Comet orbit lines
COMETS.forEach(c=>makeOrbitLine(c.a,c.e,c.i,c.node,c.peri,0x224433,0.35));

// ── label helper ─────────────────────────────────────────────────────────────
function makeLabel(text, scale=8){
  const c2=document.createElement('canvas'); c2.width=160; c2.height=32;
  const ctx=c2.getContext('2d');
  ctx.font='bold 12px sans-serif'; ctx.fillStyle='rgba(180,180,180,0.85)';
  ctx.textAlign='center'; ctx.fillText(text,80,22);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c2),transparent:true}));
  sp.scale.set(scale,2,1);
  return sp;
}

// ── build planet meshes ───────────────────────────────────────────────────────
const planetMeshes=[], allClickable=[];

PLANETS.forEach((p,idx)=>{
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(p.r*0.5,16,16),
    new THREE.MeshPhongMaterial({color:p.color,shininess:40})
  );
  if(p.name==='Saturn'){
    const ring=new THREE.Mesh(
      new THREE.RingGeometry(0.85,1.55,64),
      new THREE.MeshBasicMaterial({color:0xb89a5e,side:THREE.DoubleSide,transparent:true,opacity:0.65})
    );
    ring.rotation.x=Math.PI/2.5;
    m.add(ring);
  }
  m.userData={type:'planet',data:p};
  scene.add(m);
  planetMeshes.push(m);
  allClickable.push(m);
  const lbl=makeLabel(p.name);
  lbl.position.set(0,p.r*0.5+1.5,0);
  m.add(lbl);
});

// ── build dwarf meshes ────────────────────────────────────────────────────────
const dwarfMeshes=[];
DWARFS.forEach(d=>{
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(d.r*0.5,12,12),
    new THREE.MeshPhongMaterial({color:d.color,shininess:20})
  );
  m.userData={type:'dwarf',data:d};
  scene.add(m);
  dwarfMeshes.push(m);
  allClickable.push(m);
  const lbl=makeLabel(d.name,9);
  lbl.position.set(0,d.r*0.5+1.2,0);
  m.add(lbl);
});

// ── build comet meshes ────────────────────────────────────────────────────────
const cometMeshes=[];
COMETS.forEach(c=>{
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(c.r*0.5,10,10),
    new THREE.MeshPhongMaterial({color:c.color,shininess:60,emissive:0x114422,emissiveIntensity:0.4})
  );
  m.userData={type:'comet',data:c};
  scene.add(m);
  cometMeshes.push(m);
  allClickable.push(m);
  const lbl=makeLabel(c.name,10);
  lbl.position.set(0,c.r*0.5+1.2,0);
  m.add(lbl);
});

// ── build moon meshes ─────────────────────────────────────────────────────────
// Moons orbit their parent planet. We compute position relative to parent's
// heliocentric position, using a simple circular orbit in the parent's equatorial plane.
const moonMeshes=[];
MOONS.forEach(mn=>{
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(0.12,10,10),
    new THREE.MeshPhongMaterial({color:mn.color,shininess:30})
  );
  m.userData={type:'moon',data:mn};
  scene.add(m);
  moonMeshes.push(m);
  allClickable.push(m);
  const lbl=makeLabel(mn.name,7);
  lbl.position.set(0,0.3,0);
  m.add(lbl);
});

// ── position update ───────────────────────────────────────────────────────────
function updatePositions(days){
  // Planets
  planetMeshes.forEach((m,i)=>{
    const p=PLANETS[i];
    const pos=keplerXYZ(p.a,p.e,p.i,p.node,p.peri,p.M0,p.P,days);
    m.position.copy(toScene(pos.x,pos.y,pos.z));
    m.userData.auDist=pos.r;
  });

  // Dwarfs
  dwarfMeshes.forEach((m,i)=>{
    const d=DWARFS[i];
    const pos=keplerXYZ(d.a,d.e,d.i,d.node,d.peri,d.M0,d.P,days);
    m.position.copy(toScene(pos.x,pos.y,pos.z));
    m.userData.auDist=pos.r;
  });

  // Comets
  cometMeshes.forEach((m,i)=>{
    const c=COMETS[i];
    const pos=keplerXYZ(c.a,c.e,c.i,c.node,c.peri,c.M0,c.P,days);
    m.position.copy(toScene(pos.x,pos.y,pos.z));
    m.userData.auDist=pos.r;
  });

  // Moons: simple circular orbit around parent planet in scene space
  moonMeshes.forEach((m,i)=>{
    const mn=MOONS[i];
    const parent=planetMeshes[mn.parent];
    const ppos=parent.position;

    // Moon angle from M0 + angular velocity
    const n=360/mn.P; // deg/day
    const angle=((mn.M0+n*days)%360+360)%360 * Math.PI/180;

    // Scale moon orbit radius: convert km to scene units
    // We use the scene-space size of the parent's AU distance as reference
    const parentAU=PLANETS[mn.parent].a;
    const scenePerAU=auToScene(parentAU)/parentAU;
    // Moon orbit radius in scene units — use a_km * MOON_SCALE * scenePerAU factor
    // but clamp to be visible
    const moonOrbitR=mn.a*MOON_SCALE*Math.sqrt(scenePerAU)*0.18;

    // Simple orbit in XZ plane (ecliptic), slight inclination
    const inc=mn.i*Math.PI/180;
    m.position.set(
      ppos.x + moonOrbitR*Math.cos(angle),
      ppos.y + moonOrbitR*Math.sin(angle)*Math.sin(inc),
      ppos.z + moonOrbitR*Math.sin(angle)*Math.cos(inc)
    );
    m.userData.auDist=null;
  });
}

// ── camera ────────────────────────────────────────────────────────────────────
let isDrag=false, prev={x:0,y:0};
let sph={theta:0.5, phi:0.82, r:140};
function updateCam(){
  camera.position.set(
    sph.r*Math.sin(sph.phi)*Math.sin(sph.theta),
    sph.r*Math.cos(sph.phi),
    sph.r*Math.sin(sph.phi)*Math.cos(sph.theta)
  );
  camera.lookAt(0,0,0);
}
updateCam();
canvas.addEventListener('mousedown',e=>{isDrag=true;prev={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  sph.theta-=(e.clientX-prev.x)*0.008;
  sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+(e.clientY-prev.y)*0.008));
  prev={x:e.clientX,y:e.clientY};
  updateCam();
});
canvas.addEventListener('wheel',e=>{
  sph.r=Math.max(5,Math.min(600,sph.r+e.deltaY*0.25));
  updateCam();e.preventDefault();
},{passive:false});
let lt=null;
canvas.addEventListener('touchstart',e=>{lt={x:e.touches[0].clientX,y:e.touches[0].clientY};},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(!lt)return;
  sph.theta-=(e.touches[0].clientX-lt.x)*0.008;
  sph.phi=Math.max(0.05,Math.min(Math.PI-0.05,sph.phi+(e.touches[0].clientY-lt.y)*0.008));
  lt={x:e.touches[0].clientX,y:e.touches[0].clientY};
  updateCam();
},{passive:true});

// ── tooltip ───────────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster(), mv=new THREE.Vector2();
const tip=document.getElementById('tooltip');
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  mv.x=((e.clientX-rect.left)/rect.width)*2-1;
  mv.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mv,camera);
  const hits=ray.intersectObjects(allClickable);
  if(hits.length){
    const obj=hits[0].object;
    const ud=obj.userData;
    let html='';
    if(ud.type==='planet'||ud.type==='dwarf'){
      html=`<b>${ud.data.name}</b><br>${ud.auDist?ud.auDist.toFixed(4)+' AU from sun':''}<br>Period: ${ud.data.P.toFixed(1)} days`;
    } else if(ud.type==='comet'){
      html=`<b>${ud.data.name}</b><br>${ud.auDist?ud.auDist.toFixed(4)+' AU from sun':''}<br>Period: ${(ud.data.P/365.25).toFixed(1)} yrs`;
    } else if(ud.type==='moon'){
      const mn=ud.data;
      html=`<b>${mn.name}</b><br>Orbits ${PLANETS[mn.parent].name}<br>Period: ${mn.P.toFixed(2)} days`;
    }
    tip.style.display='block';
    tip.style.left=(e.clientX+14)+'px';
    tip.style.top=(e.clientY-44)+'px';
    tip.innerHTML=html;
    setTimeout(()=>tip.style.display='none',4500);
  }
});

// ── info panel ────────────────────────────────────────────────────────────────
const infoEl=document.getElementById('info'), clockEl=document.getElementById('clock');
let lastInfoUpdate=0;

// ── animate ───────────────────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const now=Date.now();
  const simDate=getSimDate();
  const days=daysJ2k(simDate);

  updatePositions(days);

  if(now-lastInfoUpdate>250){
    lastInfoUpdate=now;
    // Build compact info panel: planets + Pluto + comets
    let rows=['<span style="color:#444;font-size:9px">Object       Dist</span>'];
    planetMeshes.forEach((m,i)=>{
      const pos=keplerXYZ(PLANETS[i].a,PLANETS[i].e,PLANETS[i].i,PLANETS[i].node,PLANETS[i].peri,PLANETS[i].M0,PLANETS[i].P,days);
      rows.push(`${PLANETS[i].name.padEnd(9)} ${pos.r.toFixed(3)} AU`);
    });
    DWARFS.forEach(d=>{
      const pos=keplerXYZ(d.a,d.e,d.i,d.node,d.peri,d.M0,d.P,days);
      rows.push(`<span style="color:#aa9966">${d.name.padEnd(9)} ${pos.r.toFixed(2)} AU</span>`);
    });
    COMETS.forEach(c=>{
      const pos=keplerXYZ(c.a,c.e,c.i,c.node,c.peri,c.M0,c.P,days);
      rows.push(`<span style="color:#88ccaa">${c.name.substring(0,9).padEnd(9)} ${pos.r.toFixed(2)} AU</span>`);
    });
    infoEl.innerHTML=rows.join('<br>');
    clockEl.textContent=simDate.toISOString().replace('T',' ').slice(0,16)+' UTC';
  }

  renderer.render(scene,camera);
}
animate();
</script>
